[connectivity]

# SERVER=0 — TABLE NODE
# Stores B-tree nodes in HBM and serves remote RDMA reads/writes from peer head nodes.
#
# Expected kernel instances after link:
# INFO: [CFGEN 83-0]   kernel: cmac_krnl, num: 1  {cmac_krnl_1}
# INFO: [CFGEN 83-0]   kernel: rocetest_krnl, num: 1  {rocetest_krnl_1}
# INFO: [CFGEN 83-0]   kernel: krnl, num: 1  {krnl_1}

slr=cmac_krnl_1:SLR2

# Memory mapping
sp=rocetest_krnl_1.m00_axi:HBM[0]
sp=krnl_1.hbm:HBM[1]
sp=krnl_1.req_buffer:HBM[2]
sp=krnl_1.resp_buffer:HBM[3]

# CMAC <-> ROCETEST (network path)
sc=cmac_krnl_1.axis_net_rx:rocetest_krnl_1.s_axis_net_rx
sc=rocetest_krnl_1.m_axis_net_tx:cmac_krnl_1.axis_net_tx

# ROCETEST <-> KRNL (role interfaces)
# TODO(phase-2): krnl exposes m_axis_tx_meta @ 256b and s_axis_rx_data @ 64b;
# rocetest_krnl role interfaces are 512b. A bridge/widener kernel or HLS-side
# widening is required before these sc= lines can be uncommented.
# sc=krnl_1.m_axis_tx_meta:rocetest_krnl_1.s_axis_role_tx_meta:512
# sc=krnl_1.m_axis_tx_data:rocetest_krnl_1.s_axis_role_tx_data:512
# sc=rocetest_krnl_1.m_axis_role_tx_status:krnl_1.s_axis_tx_status
# sc=rocetest_krnl_1.m_axis_role_rx_data:krnl_1.s_axis_rx_data:512
